name: webhook-release

# Builds the static linux/amd64 ACME authorizing-webhook binary and publishes a
# GitHub release whose asset the RADIUS VM startup script downloads (the webhook
# runs as a localhost systemd service on each VM, not Cloud Run).
#
# Versioning: the release tag is webhook-v<VERSION> where VERSION is the contents
# of webhook/VERSION. On merge to main, if that tag does not already exist, the
# job builds, tests, and creates the release. Bump webhook/VERSION to ship a new
# binary; the cloud-8021x var webhook_release_version must match.

on:
  push:
    branches: [main]
    paths:
      - "webhook/**"
      - ".github/workflows/webhook-release.yml"
  workflow_dispatch: {}

permissions:
  contents: write # create releases + tags

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webhook
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: webhook/go.mod
          cache-dependency-path: webhook/go.sum

      - name: Test
        run: go test ./...

      - name: Read version
        id: ver
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="webhook-v${{ steps.ver.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $tag already exists; skipping build/publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static binary
        if: steps.exists.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${VERSION}" -o acme-authz-webhook-linux-amd64 .
          sha256sum acme-authz-webhook-linux-amd64 > acme-authz-webhook-linux-amd64.sha256

      - name: Create release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="webhook-v${{ steps.ver.outputs.version }}"
          gh release create "$tag" \
            acme-authz-webhook-linux-amd64 \
            acme-authz-webhook-linux-amd64.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --title "ACME authorizing webhook v${{ steps.ver.outputs.version }}" \
            --notes "Static linux/amd64 build of the step-ca ACME/SCEP authorizing webhook (gates issuance on Fleet-enrolled device serials). Downloaded by the RADIUS VM startup script and run as a localhost systemd service alongside step-ca. Pin via the cloud-8021x var webhook_release_version=${{ steps.ver.outputs.version }}."
